name: Post-merge live readiness

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  post-merge-live-readiness:
    name: Check live redeploy after merge
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Northflank redeploy and startup-log export
        run: sleep 300

      - name: Check out exact main commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify runtime-status startup log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.sha }}
          MERGED_AT: ${{ github.event.head_commit.timestamp }}
          RUNTIME_STATUS_BRANCH: runtime-status
          REQUIRE_FINAL_GATE: '0'
        run: node scripts/check-post-merge-live-readiness-pr234.js
