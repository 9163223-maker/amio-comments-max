name: AdminKIT post-merge runtime check

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Expected merged main commit SHA
        required: true
      wait_minutes:
        description: Minutes to wait before checking runtime-status
        required: false
        default: '5'
      runtime_branch:
        description: Runtime diagnostics branch
        required: false
        default: runtime-status

permissions:
  contents: read

jobs:
  runtime-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository scripts
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run post-merge runtime pickup gate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          RUNTIME_BRANCH: ${{ inputs.runtime_branch }}
          WAIT_MINUTES: ${{ inputs.wait_minutes }}
        run: |
          set +e
          node scripts/check-post-merge-runtime-pickup.js \
            --expected_sha "$EXPECTED_SHA" \
            --runtime_branch "${RUNTIME_BRANCH:-runtime-status}" \
            --wait_minutes "${WAIT_MINUTES:-5}"
          code=$?
          if [ -f runtime-post-merge-check.json ]; then
            node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
            const fs = require('fs');
            const out = JSON.parse(fs.readFileSync('runtime-post-merge-check.json', 'utf8'));
            console.log('## AdminKIT post-merge runtime pickup gate\n');
            console.log(`- expected_sha: \`${out.expected_sha}\``);
            console.log(`- startup_log_sha: \`${out.startup_log_sha || ''}\``);
            console.log(`- runtime_status_updatedAt: \`${out.runtime_status_updatedAt || ''}\``);
            console.log(`- northflank_configured: \`${out.northflank_configured}\``);
            console.log(`- northflank_startup_seen: \`${out.northflank_startup_seen}\``);
            console.log(`- likely_reason: \`${out.likely_reason}\``);
            console.log(`- result: **${out.ok ? 'PASS' : 'BLOCK'}**`);
NODE
          fi
          exit "$code"

      - name: Upload sanitized runtime check artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-post-merge-check
          path: runtime-post-merge-check.json
          if-no-files-found: ignore
          retention-days: 14
