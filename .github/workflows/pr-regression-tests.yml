name: PR regression tests

on:
  pull_request:
  push:
    branches:
      - 'codex/**'

permissions:
  contents: read

jobs:
  regression-tests:
    name: AdminKIT regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the exact event commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check key JavaScript files
        run: |
          node --check bot.js
          node --check buildInfo.js
          node --check channel-post-picker-core.js
          node --check clean-bot-campaign-attribution-cc8336.js
          node --check clean-entrypoint-1.53.10-pr89.js
          node --check features/admin-activation-screens-pr108.js
          node --check features/account-screens-pr106.js
          node --check features/menu-v3/adapter.js
          node --check features/menu-v3/canonical-menu.js
          node --check public/push-client.js
          node --check runtime-contract-routes.js
          node --check services/accessGateService.js
          node --check services/groupPushAdminPublishingService.js
          node --check services/groupPushOnboardingService.js
          node --check services/maxCommandRegistryService.js
          node --check services/runtimeContractService.js
          node --check services/startupLogService.js
          node --check services/liveVersionSnapshotService.js
          node --check services/fullSectionMatrixService.js
          node --check scripts/test-pr260-full-section-matrix.js
          node --check scripts/test-pr260-runtime-diagnostics-observable.js
          node --check performance-debug-routes-pr73.js
          node --check pr180-startup-log-bootstrap.js
          node --check pr191-push-admin-invite-title-commands-bootstrap.js
          node --check pr205-final-runtime-readiness-gate.js
          node --check services/pushPairingService.js
          node --check v3-menu-core-1539.js
          node --check web-push-routes.js
          node --check scripts/test-v3-channels-list-hydration-pr194.js
          node --check scripts/test-buttons-post-picker-tenant-channels-pr195.js
          node --check scripts/test-runtime-contract-log-pr196.js
          node --check scripts/test-startup-log-live-version-snapshot-pr200.js
          node --check scripts/test-final-runtime-readiness-gate-pr205.js
          node --check scripts/test-canonical-post-feature-binding-pr219.js
          node --check scripts/test-buttons-product-perfect-actions-pr221.js
          node --check scripts/test-buttons-flow-layer-audit-pr222.js
          node --check scripts/test-product-perfect-matrix-pr223.js
          node --check scripts/test-buttons-transition-contract-pr224.js
          node --check scripts/test-buttons-readonly-pretrace-pr225.js
          node --check scripts/test-gifts-canonical-transition-pr225.js

      - name: Run AdminKIT regression tests
        run: |
          set -uo pipefail
          mkdir -p runtime/ci-diagnostics
          echo "${GITHUB_SHA}" > runtime/ci-diagnostics/HEAD_SHA.txt
          : > runtime/ci-diagnostics/RUN_ORDER.txt

          write_failure_summary() {
            local name="$1"
            local code="$2"
            local log="runtime/ci-diagnostics/${name}.log"
            echo "$name" > runtime/ci-diagnostics/FAILED_TEST.txt
            echo "$code" > runtime/ci-diagnostics/FAILED_EXIT_CODE.txt
            tail -n 220 "$log" > runtime/ci-diagnostics/FAILED_TAIL.log || true
            {
              echo "## AdminKIT CI failed"
              echo ""
              echo "**Failed test:** \`$name\`"
              echo ""
              echo "**Exit code:** \`$code\`"
              echo ""
              echo "**Head SHA:** \`${GITHUB_SHA}\`"
              echo ""
              echo "### Last 220 lines"
              echo '```text'
              cat runtime/ci-diagnostics/FAILED_TAIL.log || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          }

          run_logged() {
            local name="$1"
            shift
            local log="runtime/ci-diagnostics/${name}.log"
            echo "$name" >> runtime/ci-diagnostics/RUN_ORDER.txt
            echo "::group::$name"
            echo "COMMAND: $*" | tee "$log"
            "$@" > >(tee -a "$log") 2> >(tee -a "$log" >&2)
            local code=$?
            echo "::endgroup::"
            if [ "$code" -ne 0 ]; then
              write_failure_summary "$name" "$code"
              exit "$code"
            fi
          }

          run_logged test-runtime-contract-log-pr196 node scripts/test-runtime-contract-log-pr196.js
          run_logged test-startup-log-live-version-snapshot-pr200 node scripts/test-startup-log-live-version-snapshot-pr200.js
          run_logged test-final-runtime-readiness-gate-pr205 node scripts/test-final-runtime-readiness-gate-pr205.js
          run_logged test-channels-tenant-hydration-pr193a node scripts/test-channels-tenant-hydration-pr193a.js
          run_logged test-v3-channels-list-hydration-pr194 node scripts/test-v3-channels-list-hydration-pr194.js
          run_logged test-buttons-post-picker-tenant-channels-pr195 node scripts/test-buttons-post-picker-tenant-channels-pr195.js
          run_logged test-canonical-post-feature-binding-pr219 node scripts/test-canonical-post-feature-binding-pr219.js
          run_logged test-buttons-product-perfect-actions-pr221 node scripts/test-buttons-product-perfect-actions-pr221.js
          run_logged test-buttons-flow-layer-audit-pr222 node scripts/test-buttons-flow-layer-audit-pr222.js
          run_logged test-product-perfect-matrix-pr223 node scripts/test-product-perfect-matrix-pr223.js
          run_logged test-buttons-transition-contract-pr224 node scripts/test-buttons-transition-contract-pr224.js
          run_logged test-buttons-readonly-pretrace-pr225 node scripts/test-buttons-readonly-pretrace-pr225.js
          run_logged test-gifts-canonical-transition-pr225 node scripts/test-gifts-canonical-transition-pr225.js
          run_logged check-test-stats-product-perfect-contract-pr226 node --check scripts/test-stats-product-perfect-contract-pr226.js
          run_logged test-stats-product-perfect-contract-pr226 node scripts/test-stats-product-perfect-contract-pr226.js
          run_logged test-push-join-chat-title-pr191 node scripts/test-push-join-chat-title-pr191.js
          run_logged test-push-admin-invite-publish-pr191 node scripts/test-push-admin-invite-publish-pr191.js
          run_logged test-max-command-sync-pr191 node scripts/test-max-command-sync-pr191.js
          run_logged test-channels-push-ux-pr177 bash -lc 'if [ -f scripts/test-channels-push-ux-pr177.js ]; then node scripts/test-channels-push-ux-pr177.js; else echo "skip PR177 channels/push UX test: file not present on this branch"; fi'
          run_logged test-production-push-audit-pr173 bash -lc 'if [ -f scripts/test-production-push-audit-pr173.js ]; then node scripts/test-production-push-audit-pr173.js; else echo "skip PR173 audit test: file not present on this branch"; fi'
          run_logged test-comments-ux-gifts-reset-pr176 bash -lc 'if [ -f scripts/test-comments-ux-gifts-reset-pr176.js ]; then node scripts/test-comments-ux-gifts-reset-pr176.js; else echo "skip PR176 comments UX/gifts reset test: file not present on this branch"; fi'
          run_logged test-canonical-menu-matrix-pr175 bash -lc 'if [ -f scripts/test-canonical-menu-matrix-pr175.js ]; then node scripts/test-canonical-menu-matrix-pr175.js; else echo "skip PR175 menu matrix test: file not present on this branch"; fi'
          run_logged test-visible-push-admin-flow-pr172 node scripts/test-visible-push-admin-flow-pr172.js
          run_logged test-public-push-entrypoint-pr169 node scripts/test-public-push-entrypoint-pr169.js
          run_logged test-push-admin-invite-link-chat-pr168 node scripts/test-push-admin-invite-link-chat-pr168.js
          run_logged test-push-product-ux-admin-invite-pr167 node scripts/test-push-product-ux-admin-invite-pr167.js
          run_logged test-group-push-private-onboarding-pr166 node scripts/test-group-push-private-onboarding-pr166.js
          run_logged test-production-runtime-push-wiring-pr165 node scripts/test-production-runtime-push-wiring-pr165.js
          run_logged test-pr260-full-section-matrix node scripts/test-pr260-full-section-matrix.js
          run_logged test-pr260-runtime-diagnostics-observable node scripts/test-pr260-runtime-diagnostics-observable.js
          run_logged npm-test npm test
          run_logged test-product-perfect-gifts-journey-pr142 node scripts/test-product-perfect-gifts-journey-pr142.js
          run_logged test-product-perfect-buttons-gifts-pr126 node scripts/test-product-perfect-buttons-gifts-pr126.js
          run_logged test-product-perfect-polls-highlights-pr127 node scripts/test-product-perfect-polls-highlights-pr127.js
          run_logged test-comments-pr125 node scripts/test-comments-pr125.js
          run_logged test-canonical-client-menu node scripts/test-canonical-client-menu.js
          run_logged git-diff-check git diff --check

          {
            echo "## AdminKIT CI passed"
            echo ""
            echo "**Head SHA:** \`${GITHUB_SHA}\`"
            echo ""
            echo "All logged regression tests passed. Diagnostics artifact: \`adminkit-ci-diagnostics\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adminkit-ci-diagnostics
          path: runtime/ci-diagnostics
          if-no-files-found: ignore
          retention-days: 7
