name: PR regression tests

on:
  pull_request:
  push:
    branches:
      - 'codex/**'

permissions:
  contents: read

jobs:
  regression-tests:
    name: AdminKIT regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the exact event commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check key JavaScript files
        run: |
          node --check bot.js
          node --check buildInfo.js
          node --check channel-post-picker-core.js
          node --check clean-bot-campaign-attribution-cc8336.js
          node --check clean-entrypoint-1.53.10-pr89.js
          node --check features/admin-activation-screens-pr108.js
          node --check features/account-screens-pr106.js
          node --check features/menu-v3/adapter.js
          node --check features/menu-v3/canonical-menu.js
          node --check public/push-client.js
          node --check runtime-contract-routes.js
          node --check services/accessGateService.js
          node --check services/groupPushAdminPublishingService.js
          node --check services/groupPushOnboardingService.js
          node --check services/maxCommandRegistryService.js
          node --check services/runtimeContractService.js
          node --check services/startupLogService.js
          node --check services/liveVersionSnapshotService.js
          node --check performance-debug-routes-pr73.js
          node --check pr180-startup-log-bootstrap.js
          node --check pr191-push-admin-invite-title-commands-bootstrap.js
          node --check pr205-final-runtime-readiness-gate.js
          node --check services/pushPairingService.js
          node --check v3-menu-core-1539.js
          node --check web-push-routes.js
          node --check scripts/test-v3-channels-list-hydration-pr194.js
          node --check scripts/test-buttons-post-picker-tenant-channels-pr195.js
          node --check scripts/test-runtime-contract-log-pr196.js
          node --check scripts/test-startup-log-live-version-snapshot-pr200.js
          node --check scripts/test-final-runtime-readiness-gate-pr205.js
          node --check scripts/test-buttons-wizard-context-inplace-pr206.js

      - name: Run AdminKIT regression tests
        run: |
          node scripts/test-runtime-contract-log-pr196.js
          node scripts/test-startup-log-live-version-snapshot-pr200.js
          node scripts/test-final-runtime-readiness-gate-pr205.js
          node scripts/test-buttons-wizard-context-inplace-pr206.js
          node scripts/test-channels-tenant-hydration-pr193a.js
          node scripts/test-v3-channels-list-hydration-pr194.js
          node scripts/test-buttons-post-picker-tenant-channels-pr195.js
          node scripts/test-push-join-chat-title-pr191.js
          node scripts/test-push-admin-invite-publish-pr191.js
          node scripts/test-max-command-sync-pr191.js
          if [ -f scripts/test-channels-push-ux-pr177.js ]; then
            node scripts/test-channels-push-ux-pr177.js
          else
            echo "skip PR177 channels/push UX test: file not present on this branch"
          fi
          if [ -f scripts/test-production-push-audit-pr173.js ]; then
            node scripts/test-production-push-audit-pr173.js
          else
            echo "skip PR173 audit test: file not present on this branch"
          fi
          if [ -f scripts/test-comments-ux-gifts-reset-pr176.js ]; then
            node scripts/test-comments-ux-gifts-reset-pr176.js
          else
            echo "skip PR176 comments UX/gifts reset test: file not present on this branch"
          fi
          if [ -f scripts/test-canonical-menu-matrix-pr175.js ]; then
            node scripts/test-canonical-menu-matrix-pr175.js
          else
            echo "skip PR175 menu matrix test: file not present on this branch"
          fi
          node scripts/test-visible-push-admin-flow-pr172.js
          node scripts/test-public-push-entrypoint-pr169.js
          node scripts/test-push-admin-invite-link-chat-pr168.js
          node scripts/test-push-product-ux-admin-invite-pr167.js
          node scripts/test-group-push-private-onboarding-pr166.js
          node scripts/test-production-runtime-push-wiring-pr165.js
          npm test
          node scripts/test-product-perfect-gifts-journey-pr142.js
          node scripts/test-product-perfect-buttons-gifts-pr126.js
          node scripts/test-product-perfect-polls-highlights-pr127.js
          node scripts/test-comments-pr125.js
          node scripts/test-canonical-client-menu.js
          git diff --check
